name: Nuclei Scan

on:
  workflow_dispatch:
    inputs:
      ip_ranges:
        description: "IP ranges to scan (single IP, CIDR, or comma/space/newline-separated list, e.g. 192.168.1.0/24,10.0.0.0/16)"
        required: true
        type: string
      ports:
        description: "Ports to scan (e.g. 80,443 or 1-1000 or top100/top1000)"
        required: false
        type: string
        default: "top1000"
      nuclei_tags:
        description: "Comma-separated nuclei tags filter (optional)"
        required: false
        type: string
        default: ""
      nuclei_min_severity:
        description: "Minimum nuclei severity"
        required: false
        type: choice
        default: "high"
        options:
          - info
          - low
          - medium
          - high
          - critical
      concurrency:
        description: "Synapse concurrency level"
        required: false
        type: string
        default: "2000"
      rate_limit:
        description: "Synapse rate limit (connections/sec, 0 = unlimited)"
        required: false
        type: string
        default: "5000"

permissions:
  contents: read

jobs:
  scan:
    name: Scan IP ranges with synapse + nuclei
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ARTIFACT_DIR: scan-artifacts
      TARGET_FILE: scan-artifacts/targets.txt
      SYNAPSE_JSONL: scan-artifacts/synapse-results.jsonl
      NUCLEI_OUT: scan-artifacts/nuclei-results.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: synapse/go.mod
          cache-dependency-path: synapse/go.sum

      - name: Build synapse
        working-directory: synapse
        run: go build -o synapse ./cmd/synapse

      - name: Install nuclei
        run: |
          set -euo pipefail

          url="$(curl -fsSL https://api.github.com/repos/projectdiscovery/nuclei/releases/latest \
            | grep "browser_download_url" \
            | grep "linux_amd64.zip" \
            | cut -d '"' -f 4 \
            | head -n 1)"

          if [ -z "$url" ]; then
            echo "::error::Failed to resolve latest nuclei linux_amd64 release URL"
            exit 1
          fi

          wget -q "$url" -O nuclei.zip
          unzip -o nuclei.zip
          chmod +x nuclei
          sudo mv nuclei /usr/local/bin/nuclei

          rm -f nuclei.zip README.md LICENSE.md LICENSE CHANGELOG.md

          nuclei -version

      - name: Update nuclei templates
        run: |
          set -euo pipefail
          nuclei -update-templates -silent || true
          nuclei -version

      - name: Prepare targets file from input
        id: targets
        env:
          IP_RANGES: ${{ inputs.ip_ranges }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"

          python3 - <<'PY' > "$TARGET_FILE"
          import os, re
          raw = os.environ.get("IP_RANGES", "")
          parts = [p.strip() for p in re.split(r"[\s,;]+", raw) if p.strip()]
          seen = set()
          out = []
          for p in parts:
              if p not in seen:
                  seen.add(p)
                  out.append(p)
          print("\n".join(out))
          PY

          echo "Targets:"
          cat "$TARGET_FILE"

          count="$(grep -c -v '^$' "$TARGET_FILE" || true)"
          if [ "${count:-0}" -eq 0 ]; then
            echo "::error::No valid IP ranges parsed from input"
            exit 1
          fi

          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Run synapse + nuclei pipeline
        working-directory: synapse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
          PORTS: ${{ inputs.ports }}
          NUCLEI_TAGS: ${{ inputs.nuclei_tags }}
          NUCLEI_MIN_SEVERITY: ${{ inputs.nuclei_min_severity }}
          CONCURRENCY: ${{ inputs.concurrency }}
          RATE_LIMIT: ${{ inputs.rate_limit }}
        run: |
          set -euo pipefail

          ulimit -n 65535 || true
          echo "ulimit: $(ulimit -n)"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::BOT_TOKEN and CHAT_ID repository secrets must be configured"
            exit 1
          fi

          args=(
            -t "../$TARGET_FILE"
            -p "$PORTS"
            -c "$CONCURRENCY"
            -rate "$RATE_LIMIT"
            --progress
            -o "../$SYNAPSE_JSONL"
            --json
            --nuclei
            --nuclei-min-severity "$NUCLEI_MIN_SEVERITY"
            --nuclei-output "../$NUCLEI_OUT"
            --telegram
            --telegram-token "$TELEGRAM_BOT_TOKEN"
            --telegram-chat-id "$TELEGRAM_CHAT_ID"
          )

          if [ -n "$NUCLEI_TAGS" ]; then
            args+=(--nuclei-tags "$NUCLEI_TAGS")
          fi

          ./synapse "${args[@]}"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cidreye-scan-results
          path: scan-artifacts/
          if-no-files-found: warn
          retention-days: 14
